<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThorCC - Professional CAD/CAM Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .accent { color: #00aaff; }
        .bg-accent { background: #00aaff; }
        .viewport-grid {
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">
    <!-- Header -->
    <header class="h-14 glass flex items-center justify-between px-6 z-20">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold tracking-tighter accent">THOR<span class="text-white">CC</span></h1>
            <div class="h-6 w-px bg-white/10 mx-2"></div>
            <nav class="flex gap-1">
                <button class="px-4 py-1 rounded-md bg-white/5 text-sm font-medium hover:bg-white/10 transition">File</button>
                <button class="px-4 py-1 rounded-md text-sm font-medium hover:bg-white/5 transition">Edit</button>
                <button class="px-4 py-1 rounded-md text-sm font-medium hover:bg-white/5 transition">View</button>
            </nav>
        </div>
        
        <div class="flex bg-white/5 p-1 rounded-lg">
            <button class="px-6 py-1 rounded-md bg-accent text-black text-xs font-bold uppercase tracking-wider transition">Sketch</button>
            <button class="px-6 py-1 rounded-md text-xs font-bold uppercase tracking-wider hover:bg-white/5 transition">Nesting</button>
            <button class="px-6 py-1 rounded-md text-xs font-bold uppercase tracking-wider hover:bg-white/5 transition">CAM</button>
            <button class="px-6 py-1 rounded-md text-xs font-bold uppercase tracking-wider hover:bg-white/5 transition">Sim</button>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-xs text-green-500">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                SERVER ONLINE
            </div>
            <button class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10">
                <span class="text-xs">?</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 glass flex flex-col z-10">
            <div class="p-4 border-b border-white/5">
                <h2 class="text-xs font-bold uppercase tracking-widest text-white/40 mb-4">Toolbar</h2>
                <div class="grid grid-cols-2 gap-2">
                    <button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-white/5 hover:bg-accent hover:text-black transition group">
                        <div class="w-6 h-6 border-2 border-current rounded-full"></div>
                        <span class="text-[10px] font-bold">CIRCLE</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-white/5 hover:bg-accent hover:text-black transition">
                        <div class="w-6 h-0.5 bg-current rotate-45"></div>
                        <span class="text-[10px] font-bold">LINE</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-white/5 hover:bg-accent hover:text-black transition">
                        <div class="w-6 h-4 border-2 border-current"></div>
                        <span class="text-[10px] font-bold">RECT</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-white/5 hover:bg-accent hover:text-black transition">
                        <div class="w-6 h-6 border-t-2 border-l-2 border-current rounded-tl-full"></div>
                        <span class="text-[10px] font-bold">ARC</span>
                    </button>
                </div>
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto">
                <h2 class="text-xs font-bold uppercase tracking-widest text-white/40 mb-4">History</h2>
                <ul class="space-y-2">
                    <li class="p-2 rounded bg-white/5 text-xs flex items-center justify-between">
                        <span>Circle_01</span>
                        <span class="text-[10px] text-white/30 italic">R: 25.0</span>
                    </li>
                    <li class="p-2 rounded bg-white/5 text-xs flex items-center justify-between border-l-2 border-accent">
                        <span>Line_01</span>
                        <span class="text-[10px] text-white/30 italic">L: 120.0</span>
                    </li>
                </ul>
            </div>

            <div class="p-4 glass m-2 rounded-xl">
                <div class="flex justify-between text-[10px] mb-2 text-white/50">
                    <span>X: 124.55</span>
                    <span>Y: -12.30</span>
                </div>
                <div class="h-1 w-full bg-white/10 rounded-full overflow-hidden">
                    <div class="h-full bg-accent w-2/3"></div>
                </div>
            </div>
        </aside>

        <!-- Viewport -->
        <div class="flex-1 relative viewport-grid flex items-center justify-center">
            <!-- 3D Gizmo -->
            <div class="absolute top-6 right-6 w-24 h-24 glass rounded-full flex items-center justify-center border-white/10">
                <div class="relative w-12 h-12">
                    <div class="absolute inset-0 border-t-2 border-red-500 origin-center rotate-0"></div>
                    <div class="absolute inset-0 border-t-2 border-green-500 origin-center rotate-90"></div>
                    <div class="absolute inset-0 border-t-2 border-blue-500 origin-center -rotate-45"></div>
                </div>
            </div>

            <!-- Central Content Placeholder -->
            <div class="relative group cursor-crosshair">
                <svg width="400" height="400" viewBox="0 0 400 400">
                    <!-- Sketch Entities -->
                    <circle cx="200" cy="200" r="100" fill="none" stroke="#00aaff" stroke-width="2" stroke-dasharray="4" class="opacity-40" />
                    <rect x="100" y="150" width="200" height="100" fill="none" stroke="#00aaff" stroke-width="2" />
                    <!-- Points -->
                    <circle cx="100" cy="150" r="3" fill="#00aaff" />
                    <circle cx="300" cy="150" r="3" fill="#00aaff" />
                    <circle cx="100" cy="250" r="3" fill="#00aaff" />
                    <circle cx="300" cy="250" r="3" fill="#00aaff" />
                </svg>
                <div class="absolute -top-4 -left-4 text-[10px] bg-accent text-black px-1 font-bold">120.00 mm</div>
            </div>

            <!-- Viewport Controls -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-4 glass p-2 rounded-2xl">
                <button class="w-10 h-10 rounded-xl hover:bg-white/10 transition flex items-center justify-center">🔍</button>
                <button class="w-10 h-10 rounded-xl hover:bg-white/10 transition flex items-center justify-center">✋</button>
                <button class="w-10 h-10 rounded-xl hover:bg-white/10 transition flex items-center justify-center">📐</button>
                <div class="w-px h-6 bg-white/10 self-center"></div>
                <button class="w-10 h-10 rounded-xl hover:bg-white/10 transition flex items-center justify-center">ISO</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="h-8 glass flex items-center justify-between px-4 text-[10px] text-white/40">
        <div>Ready</div>
        <div class="flex gap-4">
            <span>UNITS: MM</span>
            <span>GRID: 10.0</span>
            <span>SNAP: ON</span>
        </div>
    </footer>
</body>
</html>
