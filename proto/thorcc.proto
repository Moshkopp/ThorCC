syntax = "proto3";

package thorcc;

message Point {
  string id = 1;
  double x = 2;
  double y = 3;
}

message SketchUpdate {
  repeated Point points = 1;
}

message ToolpathUpdate {
  repeated Point path = 1;
}

message ServerMessage {
  oneof payload {
    SketchUpdate sketch = 1;
    ToolpathUpdate toolpath = 2;
  }
}

message ClientMessage {
  oneof payload {
    Point move_point = 1;
    string select_entity = 2;
  }
}
